<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 760" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="1" stop-color="#0d1424"/>
    </linearGradient>
    <linearGradient id="trace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#818cf8" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <rect width="920" height="760" fill="url(#bg)"/>

  <!-- header -->
  <text x="48" y="56" fill="#e6edf6" font-size="30" font-weight="700">TurnZero</text>
  <text x="48" y="76" fill="#7c8aa0" font-size="11" letter-spacing="3">REAL-TIME VOICE PROTOCOL STACK</text>
  <text x="872" y="50" text-anchor="end" fill="#7c8aa0" font-size="11" letter-spacing="3">8-LAYER ARCHITECTURE</text>
  <text x="872" y="68" text-anchor="end" fill="#2dd4bf" font-size="12" font-weight="600">+ Trace Plane</text>

  <!-- layers: drawn top (L7) to bottom (L0), cascading offsets -->
  <!-- each row: y, label, name, subtitle, accent -->
  <g>
    <!-- L7 CONNECT -->
    <g transform="translate(470,108)">
      <rect width="380" height="58" rx="8" fill="#10b98110" stroke="#10b981" stroke-width="1"/>
      <text x="18" y="26" fill="#34d399" font-size="16" font-weight="700" letter-spacing="2">CONNECT</text>
      <text x="120" y="26" fill="#9fb0c3" font-size="10">Integration Layer</text>
      <text x="18" y="46" fill="#7c8aa0" font-size="10">CRM Sync · Calendar Booking · Messaging</text>
    </g>
    <text x="430" y="142" text-anchor="end" fill="#34d399" font-size="11" font-weight="700">L7</text>

    <!-- L6 CONVERSE -->
    <g transform="translate(410,176)">
      <rect width="440" height="58" rx="8" fill="#f59e0b10" stroke="#f59e0b" stroke-width="1"/>
      <text x="18" y="26" fill="#fbbf24" font-size="16" font-weight="700" letter-spacing="2">CONVERSE</text>
      <text x="135" y="26" fill="#9fb0c3" font-size="10">Turn Management Layer</text>
      <text x="18" y="46" fill="#7c8aa0" font-size="10">Interruption Handling · Silence Mgmt · Hold Orchestration</text>
    </g>
    <text x="370" y="210" text-anchor="end" fill="#fbbf24" font-size="11" font-weight="700">L6</text>

    <!-- L5 SPEAK -->
    <g transform="translate(350,244)">
      <rect width="500" height="58" rx="8" fill="#ec489910" stroke="#ec4899" stroke-width="1"/>
      <text x="18" y="26" fill="#f472b6" font-size="16" font-weight="700" letter-spacing="2">SPEAK</text>
      <text x="105" y="26" fill="#9fb0c3" font-size="10">Voice Synthesis Layer</text>
      <text x="18" y="46" fill="#7c8aa0" font-size="10">Multi-Provider Routing · Indic Voice Profiles · Zero-Latency Delivery</text>
    </g>
    <text x="310" y="278" text-anchor="end" fill="#f472b6" font-size="11" font-weight="700">L5</text>

    <!-- L4 RECALL -->
    <g transform="translate(290,312)">
      <rect width="560" height="58" rx="8" fill="#a855f710" stroke="#a855f7" stroke-width="1"/>
      <text x="18" y="26" fill="#c084fc" font-size="16" font-weight="700" letter-spacing="2">RECALL</text>
      <text x="115" y="26" fill="#9fb0c3" font-size="10">Knowledge Retrieval Layer</text>
      <text x="18" y="46" fill="#7c8aa0" font-size="10">3-Tier Adaptive Retrieval · Context Assembly · Relevance Pipeline</text>
    </g>
    <text x="250" y="346" text-anchor="end" fill="#c084fc" font-size="11" font-weight="700">L4</text>

    <!-- L3 THINK -->
    <g transform="translate(230,380)">
      <rect width="620" height="58" rx="8" fill="#6366f110" stroke="#6366f1" stroke-width="1"/>
      <text x="18" y="26" fill="#818cf8" font-size="16" font-weight="700" letter-spacing="2">THINK</text>
      <text x="105" y="26" fill="#9fb0c3" font-size="10">Intelligence Layer</text>
      <text x="18" y="46" fill="#7c8aa0" font-size="10">Predictive Response · Intent Orchestration · Confidence Scoring</text>
    </g>
    <text x="190" y="414" text-anchor="end" fill="#818cf8" font-size="11" font-weight="700">L3</text>

    <!-- L2 PERCEIVE -->
    <g transform="translate(170,448)">
      <rect width="680" height="58" rx="8" fill="#3b82f610" stroke="#3b82f6" stroke-width="1"/>
      <text x="18" y="26" fill="#60a5fa" font-size="16" font-weight="700" letter-spacing="2">PERCEIVE</text>
      <text x="135" y="26" fill="#9fb0c3" font-size="10">Speech Recognition Layer</text>
      <text x="18" y="46" fill="#7c8aa0" font-size="10">Streaming Recognition · 11+ Indic Languages · Code-Switch Detection</text>
    </g>
    <text x="130" y="482" text-anchor="end" fill="#60a5fa" font-size="11" font-weight="700">L2</text>

    <!-- L1 STREAM -->
    <g transform="translate(110,516)">
      <rect width="740" height="58" rx="8" fill="#14b8a610" stroke="#14b8a6" stroke-width="1"/>
      <text x="18" y="26" fill="#2dd4bf" font-size="16" font-weight="700" letter-spacing="2">STREAM</text>
      <text x="115" y="26" fill="#9fb0c3" font-size="10">Audio Transport Layer</text>
      <text x="18" y="46" fill="#7c8aa0" font-size="10">Bi-directional Pipeline · Persistent Connections · Sub-Frame Sync</text>
    </g>
    <text x="70" y="550" text-anchor="end" fill="#2dd4bf" font-size="11" font-weight="700">L1</text>

    <!-- L0 CARRIER -->
    <g transform="translate(50,584)">
      <rect width="800" height="58" rx="8" fill="#06b6d410" stroke="#06b6d4" stroke-width="1"/>
      <text x="18" y="26" fill="#22d3ee" font-size="16" font-weight="700" letter-spacing="2">CARRIER</text>
      <text x="120" y="26" fill="#9fb0c3" font-size="10">Telephony Layer</text>
      <text x="18" y="46" fill="#7c8aa0" font-size="10">PSTN Gateway · Carrier-Grade Routing · Session Persistence</text>
    </g>
    <text x="40" y="618" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="700">L0</text>
  </g>

  <!-- Trace Plane vertical rail on the right -->
  <g>
    <rect x="868" y="108" width="6" height="534" rx="3" fill="url(#trace)"/>
    <g transform="translate(889,375)">
      <text transform="rotate(90)" x="0" y="0" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="700" letter-spacing="3">TRACE PLANE</text>
      <text transform="rotate(90)" x="0" y="16" text-anchor="middle" fill="#7c8aa0" font-size="9" letter-spacing="2">structured receipt per turn · never on the live path</text>
    </g>
  </g>

  <!-- flow indicator -->
  <text x="50" y="676" fill="#5f6b7e" font-size="10" letter-spacing="2">▼ CALLER INPUT climbs the stack · AI RESPONSE descends ▲ · &lt; 2s end-to-end</text>

  <!-- footer tagline -->
  <text x="50" y="712" fill="#9fb0c3" font-size="15" font-weight="300">Some will see 8 fancy labels.</text>
  <text x="50" y="734" fill="#e6edf6" font-size="15" font-weight="700">Engineers will see 3 months of <tspan fill="#fbbf24">sleepless nights.</tspan></text>

  <text x="872" y="712" text-anchor="end" fill="#46536a" font-size="10" letter-spacing="2">OSI · TCP/IP · SS7 · SIP · RTP · TurnZero</text>
</svg>
